name: CI Pipeline

on:
  push: { branches: [main, develop] }
  pull_request: { branches: [main] }

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install ruff mypy
      - run: ruff check .
      - run: mypy --ignore-missing-imports .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
        options: --health-cmd "curl -f http://localhost:6333/readyz" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install -r requirements.txt -r tests/requirements-test.txt
      - run: pytest tests/unit/ -v --tb=short --junitxml=reports/unit.xml
      - run: pytest tests/integration/ -v --tb=short --junitxml=reports/integration.xml
        env:
          QDRANT_URL: http://localhost:6333
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      - uses: actions/upload-artifact@v4
        with: { name: test-reports, path: reports/ }

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install bandit safety
      - run: bandit -r . -x ./tests -f json -o reports/bandit.json || true
      - run: safety check -r requirements.txt --output json > reports/safety.json || true

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with: { context: ".", push: false, tags: "rag-api:${{ github.sha }}", cache-from: "type=gha", cache-to: "type=gha,mode=max" }

  load-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      qdrant: { image: "qdrant/qdrant:latest", ports: ["6333:6333"] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: pip install -r requirements.txt
      - run: uvicorn main:app --host 0.0.0.0 --port 8000 &
        env: { QDRANT_URL: "http://localhost:6333", GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}", VOYAGE_API_KEY: "${{ secrets.VOYAGE_API_KEY }}" }
      - run: sleep 5
      - uses: grafana/k6-action@v0.3.1
        with: { filename: tests/load/k6_smoke.js }
