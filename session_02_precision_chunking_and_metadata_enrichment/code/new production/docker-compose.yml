version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrant_data:/qdrant/storage]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':>/dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 2G, cpus: "2.0" }

  rag-api:
    build: .
    container_name: rag-api
    ports: ["8000:8000"]
    env_file: [.env]
    environment: { QDRANT_URL: "http://qdrant:6333" }
    depends_on:
      qdrant: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits: { memory: 1G, cpus: "1.0" }

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      [
        ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml,
        prometheus_data:/prometheus,
      ]

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment: { GF_SECURITY_ADMIN_PASSWORD: admin }
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on: [prometheus]

  k6:
    image: grafana/k6:latest
    volumes: [./tests/load:/scripts]
    environment: { BASE_URL: "http://rag-api:8000" }
    profiles: ["testing"]
    entrypoint: ["k6", "run", "/scripts/k6_smoke.js"]
    depends_on:
      rag-api: { condition: service_healthy }

volumes:
  qdrant_data:
  prometheus_data:
  grafana_data:
